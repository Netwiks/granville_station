<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL MINITEL - GRANVILLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --minitel-bg: #000000;
            --minitel-yellow: #ffcc00;
        }

        body {
            background-color: #1a1a1a;
            color: var(--minitel-yellow);
            font-family: 'VT323', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-transform: uppercase;
        }

        .monitor {
            background-color: var(--minitel-bg);
            width: 95vw;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            border: 20px solid #333;
            border-radius: 15px;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,1), 0 20px 50px rgba(0,0,0,0.5);
            padding: 20px;
            overflow: hidden;
            border-bottom-width: 40px;
        }

        .screen-overlay {
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        .minitel-header {
            background-color: var(--minitel-yellow);
            color: black;
            font-weight: bold;
            padding: 2px 10px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .minitel-content {
            border: 2px solid var(--minitel-yellow);
            height: 85%;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .blink {
            animation: blinker 1s step-start infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        .pixel-border {
            border: 4px double var(--minitel-yellow);
            padding: 15px;
        }

        .btn-fake {
            background: var(--minitel-yellow);
            color: black;
            padding: 0 5px;
            margin-right: 5px;
        }

    </style>
</head>
<body>
    <div class="monitor">
        <div class="screen-overlay"></div>
        
        <div class="minitel-header">
            <span>3615 GRANVILLE</span>
            <span>CONNECTE <span class="blink">_</span></span>
        </div>

        <div class="minitel-content">
            <!-- Section Temps -->
            <div class="text-center mb-8">
                <div id="clock" class="text-7xl font-bold mb-2">00:00:00</div>
                <div id="date" class="text-2xl border-t border-b border-yellow-500 py-1">CHARGEMENT...</div>
            </div>

            <!-- Grille d'informations -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                <div class="pixel-border">
                    <div class="text-xl mb-2 font-bold"><span class="btn-fake">1</span> EPHEMERIDE</div>
                    <div id="ephemeris" class="text-2xl">SAINT : --</div>
                </div>

                <div class="pixel-border">
                    <div class="text-xl mb-2 font-bold"><span class="btn-fake">2</span> METEO LOCALE</div>
                    <div id="weather">
                        <div id="sky" class="text-2xl mb-1">CIEL : --</div>
                        <div class="text-3xl">TEMP : <span id="temp">--</span> C</div>
                        <div class="text-xl">VENT : <span id="wind">--</span> KM/H</div>
                    </div>
                </div>
            </div>

            <div class="mt-auto text-center opacity-40 text-xs">
                RECEPTION SIGNAL : OK (GRANVILLE-ST-NICOLAS)
            </div>
        </div>
    </div>

    <script>
        // --- GESTION DU TEMPS ---
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('fr-FR', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- GESTION ÉPHÉMÉRIDE ---
        const saints = {
            "0-1": "JOUR DE L'AN", "0-2": "BASILE", "0-3": "GENEVIEVE", "1-14": "VALENTIN",
            "4-1": "FETE DU TRAVAIL", "11-25": "NOEL", "6-14": "EVRARD"
        };

        function updateEphemeris() {
            const now = new Date();
            const key = `${now.getMonth()}-${now.getDate()}`;
            const backupSaints = ["ST AMAND", "ST GASTON", "STE JACQUELINE", "ST ARNAUD", "ST VALENTIN", "ST LAZARE", "ST ROMAIN", "ST AUBIN"];
            const saint = saints[key] || backupSaints[now.getDate() % backupSaints.length];
            document.getElementById('ephemeris').textContent = `SAINT : ${saint}`;
        }
        updateEphemeris();

        // --- INTERPRETATION CODES METEO ---
        function getSkyDescription(code) {
            if (code === 0) return "CIEL : CLAIR";
            if (code >= 1 && code <= 3) return "CIEL : PEU NUAGEUX";
            if (code >= 45 && code <= 48) return "CIEL : BROUILLARD";
            if (code >= 51 && code <= 55) return "CIEL : BRUINE";
            if (code >= 61 && code <= 65) return "CIEL : PLUIE";
            if (code >= 71 && code <= 77) return "CIEL : NEIGE";
            if (code >= 80 && code <= 82) return "CIEL : AVERSES";
            if (code >= 95) return "CIEL : ORAGE";
            return "CIEL : VARIABLE";
        }

        // --- GESTION MÉTÉO (Granville : 48.833, -1.571) ---
        async function fetchWeather() {
            try {
                // Coordonnées précises : 48.833, -1.571
                const lat = 48.833; 
                const lon = -1.571;
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await response.json();

                if (data.current_weather) {
                    document.getElementById('temp').textContent = Math.round(data.current_weather.temperature);
                    document.getElementById('wind').textContent = Math.round(data.current_weather.windspeed);
                    document.getElementById('sky').textContent = getSkyDescription(data.current_weather.weathercode);
                }
            } catch (error) {
                console.error("Erreur météo:", error);
                document.getElementById('weather').innerHTML = "ERREUR TRANSMISSION";
            }
        }
        
        fetchWeather();
        setInterval(fetchWeather, 1800000);
    </script>
</body>
</html>

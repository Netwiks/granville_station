<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3615 GRANVILLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --minitel-yellow: #ffcc00; }
        body { background-color: #1a1a1a; color: var(--minitel-yellow); font-family: 'VT323', monospace; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; text-transform: uppercase; }
        .monitor { background-color: #000; width: 95vw; max-width: 800px; aspect-ratio: 4 / 3; border: 20px solid #333; border-radius: 15px; position: relative; box-shadow: inset 0 0 50px #000, 0 20px 50px rgba(0,0,0,0.5); padding: 20px; overflow: hidden; border-bottom-width: 40px; }
        .screen-overlay { position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; z-index: 10; pointer-events: none; }
        .minitel-header { background-color: var(--minitel-yellow); color: black; font-weight: bold; padding: 2px 10px; display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 1.5rem; }
        .minitel-content { border: 2px solid var(--minitel-yellow); height: 85%; padding: 20px; display: flex; flex-direction: column; }
        .pixel-border { border: 4px double var(--minitel-yellow); padding: 15px; }
        .btn-fake { background: var(--minitel-yellow); color: black; padding: 0 5px; margin-right: 5px; }
        .blink { animation: blinker 1s step-start infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="monitor">
        <div class="screen-overlay"></div>
        <div class="minitel-header">
            <span>3615 GRANVILLE</span>
            <span>STATION ACTIVE <span class="blink">_</span></span>
        </div>
        <div class="minitel-content">
            <!-- Section Horloge -->
            <div class="text-center mb-8">
                <div id="clock" class="text-7xl font-bold mb-2">00:00:00</div>
                <div id="date" class="text-2xl border-t border-b border-yellow-500 py-1">CHARGEMENT...</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                <!-- BLOC 1 : SOLAIRE & EXTREMES (Nouveau) -->
                <div class="pixel-border">
                    <div class="text-xl mb-2 font-bold"><span class="btn-fake">1</span> CYCLE SOLAIRE</div>
                    <div id="solar-info" class="text-xl space-y-1">
                        <div>LEVER : <span id="sunrise">--:--</span></div>
                        <div>COUCHER : <span id="sunset">--:--</span></div>
                        <div class="mt-2 pt-2 border-t border-yellow-900 italic">
                            MAX : <span id="temp-max">--</span> C | MIN : <span id="temp-min">--</span> C
                        </div>
                    </div>
                </div>

                <!-- BLOC 2 : METEO LOCALE -->
                <div class="pixel-border">
                    <div class="text-xl mb-2 font-bold"><span class="btn-fake">2</span> METEO ACTUELLE</div>
                    <div id="weather">
                        <div id="sky" class="text-2xl mb-1">CIEL : --</div>
                        <div class="text-3xl"><span id="temp">--</span> C | <span id="wind">--</span> KM/H</div>
                    </div>
                </div>
            </div>

            <div class="mt-auto text-center opacity-40 text-xs">
                GRANVILLE : 48.83N / 1.57W | MAJ : AUTOMATIQUE
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('fr-FR');
            document.getElementById('date').textContent = now.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function getSkyDescription(code) {
            const map = { 0: "CLAIR", 1: "PEU NUAGEUX", 2: "NUAGEUX", 3: "COUVERT", 45: "BROUILLARD", 51: "BRUINE", 61: "PLUIE", 71: "NEIGE", 80: "AVERSES", 95: "ORAGE" };
            return map[code] || "VARIABLE";
        }

        function formatTime(isoString) {
            if (!isoString) return "--:--";
            const date = new Date(isoString);
            return date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        }

        async function fetchWeather() {
            try {
                // Appel avec données actuelles + quotidiennes (soleil et extrêmes)
                const url = `https://api.open-meteo.com/v1/forecast?latitude=48.833&longitude=-1.571&current_weather=true&daily=sunrise,sunset,temperature_2m_max,temperature_2m_min&timezone=auto`;
                const response = await fetch(url);
                const data = await response.json();
                
                // Données actuelles
                const cur = data.current_weather;
                if (cur) {
                    document.getElementById('temp').textContent = Math.round(cur.temperature);
                    document.getElementById('wind').textContent = Math.round(cur.windspeed);
                    document.getElementById('sky').textContent = "CIEL : " + getSkyDescription(cur.weathercode);
                }

                // Données quotidiennes
                const daily = data.daily;
                if (daily) {
                    document.getElementById('sunrise').textContent = formatTime(daily.sunrise[0]);
                    document.getElementById('sunset').textContent = formatTime(daily.sunset[0]);
                    document.getElementById('temp-max').textContent = Math.round(daily.temperature_2m_max[0]);
                    document.getElementById('temp-min').textContent = Math.round(daily.temperature_2m_min[0]);
                }
            } catch (e) {
                console.error("Erreur liaison", e);
            }
        }
        
        fetchWeather();
        setInterval(fetchWeather, 1800000); // Mise à jour toutes les 30 min
    </script>
</body>
</html>
